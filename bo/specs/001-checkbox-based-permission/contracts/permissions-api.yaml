openapi: 3.0.3
info:
  title: Fresh Checkbox Permission Management API
  description: Clean implementation of permission system with Better Auth organization plugin
  version: 1.0.0
  contact:
    name: Fresh Implementation
    description: Constitutional compliance + Better Auth native

servers:
  - url: http://localhost:3000
    description: Development server

paths:
  # Better Auth Organization APIs (Native)
  /api/auth/organization:
    get:
      summary: 列出使用者組織
      description: Better Auth 原生 API - 取得使用者所屬組織列表
      tags:
        - Better Auth
      security:
        - sessionAuth: []
      responses:
        '200':
          description: 使用者組織列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Organization'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/organization/{organizationId}/members:
    get:
      summary: 列出組織成員
      description: Better Auth 原生 API - 取得組織成員及其角色
      tags:
        - Better Auth
      security:
        - sessionAuth: []
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
          description: 組織 ID
      responses:
        '200':
          description: 組織成員列表
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MemberWithUser'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/auth/organization/{organizationId}/invite:
    post:
      summary: 邀請組織成員
      description: Better Auth 原生 API - 邀請新成員加入組織
      tags:
        - Better Auth
      security:
        - sessionAuth: []
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - role
              properties:
                email:
                  type: string
                  format: email
                  example: newuser@example.com
                role:
                  $ref: '#/components/schemas/MemberRole'
      responses:
        '200':
          description: 邀請發送成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  invitationId:
                    type: string

  /api/auth/organization/{organizationId}/members/{userId}:
    patch:
      summary: 更新成員角色
      description: Better Auth 原生 API - 更新組織成員角色
      tags:
        - Better Auth
      security:
        - sessionAuth: []
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - role
              properties:
                role:
                  $ref: '#/components/schemas/MemberRole'
      responses:
        '200':
          description: 角色更新成功

    delete:
      summary: 移除組織成員
      description: Better Auth 原生 API - 從組織中移除成員
      tags:
        - Better Auth
      security:
        - sessionAuth: []
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 成員移除成功

  # Fresh Permission Management APIs
  /api/permissions/matrix/{subjectType}/{subjectId}:
    get:
      summary: 取得權限矩陣
      description: 取得使用者或成員的完整權限矩陣，包含繼承權限
      tags:
        - Permissions
      security:
        - sessionAuth: []
      parameters:
        - name: subjectType
          in: path
          required: true
          schema:
            type: string
            enum: [user, member]
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
        - name: organizationId
          in: query
          required: true
          schema:
            type: string
          description: 組織 ID (用於組織權限範圍)
      responses:
        '200':
          description: 權限矩陣
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionMatrix'

    patch:
      summary: 批量更新權限
      description: 批量更新使用者或成員的權限設定 (checkbox 操作)
      tags:
        - Permissions
      security:
        - sessionAuth: []
      parameters:
        - name: subjectType
          in: path
          required: true
          schema:
            type: string
            enum: [user, member]
        - name: subjectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - organizationId
                - permissions
              properties:
                organizationId:
                  type: string
                permissions:
                  type: array
                  items:
                    type: object
                    required:
                      - resource
                      - action
                      - granted
                    properties:
                      resource:
                        $ref: '#/components/schemas/PermissionResource'
                      action:
                        $ref: '#/components/schemas/PermissionAction'
                      granted:
                        type: boolean
      responses:
        '200':
          description: 權限更新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer
                    description: 更新的權限數量
                  matrix:
                    $ref: '#/components/schemas/PermissionMatrix'

  /api/permissions/check:
    post:
      summary: 檢查權限
      description: 檢查特定使用者對特定資源和操作的權限
      tags:
        - Permissions
      security:
        - sessionAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - userId
                - organizationId
                - resource
                - action
              properties:
                userId:
                  type: string
                organizationId:
                  type: string
                resource:
                  $ref: '#/components/schemas/PermissionResource'
                action:
                  $ref: '#/components/schemas/PermissionAction'
      responses:
        '200':
          description: 權限檢查結果
          content:
            application/json:
              schema:
                type: object
                properties:
                  allowed:
                    type: boolean
                  source:
                    type: string
                    enum: [system_admin, org_owner, member_role, direct_permission, inherited_permission]
                  limitations:
                    type: array
                    items:
                      type: string

  # Organization Permission Limits (System Admin Only)
  /api/admin/organizations/{organizationId}/permission-limits:
    get:
      summary: 取得組織權限限制
      description: 系統管理員取得組織的權限邊界設定
      tags:
        - Admin
      security:
        - sessionAuth: []
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: 組織權限限制
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/OrganizationPermissionLimit'
        '403':
          description: 需要系統管理員權限

    put:
      summary: 設定組織權限限制
      description: 系統管理員設定組織可用的權限範圍
      tags:
        - Admin
      security:
        - sessionAuth: []
      parameters:
        - name: organizationId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: array
              items:
                type: object
                required:
                  - resource
                  - action
                  - allowed
                properties:
                  resource:
                    $ref: '#/components/schemas/PermissionResource'
                  action:
                    $ref: '#/components/schemas/PermissionAction'
                  allowed:
                    type: boolean
      responses:
        '200':
          description: 權限限制設定成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  updated:
                    type: integer

  # Routes compatibility check
  /api/permissions/routes:
    get:
      summary: 路由兼容性檢查
      description: 確認新權限路由不與現有路由衝突
      tags:
        - System
      responses:
        '200':
          description: 路由狀態檢查
          content:
            application/json:
              schema:
                type: object
                properties:
                  existingRoutes:
                    type: integer
                    description: 現有路由數量
                  newRoutes:
                    type: integer
                    description: 新增路由數量
                  conflicts:
                    type: array
                    items:
                      type: string
                    description: 路由衝突 (應為空)

components:
  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: better-auth.session_token
      description: Better Auth session cookie

  responses:
    Unauthorized:
      description: 未授權 - 需要登入
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Unauthorized"

    Forbidden:
      description: 禁止訪問 - 權限不足
      content:
        application/json:
          schema:
            type: object
            properties:
              error:
                type: string
                example: "Insufficient permissions"

  schemas:
    Organization:
      type: object
      properties:
        id:
          type: string
          example: "org_clq123"
        name:
          type: string
          example: "PlayHard Gaming"
        slug:
          type: string
          example: "playhard-gaming"
        logo:
          type: string
          nullable: true
          example: "https://example.com/logo.png"
        createdAt:
          type: string
          format: date-time

    Member:
      type: object
      properties:
        id:
          type: string
        organizationId:
          type: string
        userId:
          type: string
        role:
          $ref: '#/components/schemas/MemberRole'
        invitedBy:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    MemberWithUser:
      allOf:
        - $ref: '#/components/schemas/Member'
        - type: object
          properties:
            user:
              $ref: '#/components/schemas/User'

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        name:
          type: string
          nullable: true
        username:
          type: string
          nullable: true
        role:
          type: string
          enum: [admin]
          nullable: true
          description: 系統管理員角色

    MemberRole:
      type: string
      enum: [owner, admin, member]
      description: |
        組織成員角色:
        - owner: 組織擁有者 (完全控制)
        - admin: 組織管理員 (部分管理權限)
        - member: 組織成員 (基礎權限)

    PermissionResource:
      type: string
      enum: [user, organization, member, report, team]
      description: |
        權限資源類型:
        - user: 使用者管理
        - organization: 組織設定
        - member: 成員管理
        - report: 報表檢視
        - team: 團隊管理

    PermissionAction:
      type: string
      enum: [create, read, update, delete]
      description: |
        權限操作類型:
        - create: 建立
        - read: 讀取
        - update: 更新
        - delete: 刪除

    Permission:
      type: object
      properties:
        id:
          type: string
        subjectType:
          type: string
          enum: [user, member]
        subjectId:
          type: string
        resource:
          $ref: '#/components/schemas/PermissionResource'
        action:
          $ref: '#/components/schemas/PermissionAction'
        granted:
          type: boolean
        grantedAt:
          type: string
          format: date-time
        grantedBy:
          type: string

    PermissionMatrix:
      type: object
      properties:
        subject:
          type: object
          properties:
            type:
              type: string
              enum: [user, member]
            id:
              type: string
            name:
              type: string
              nullable: true
            email:
              type: string
              nullable: true
        organizationId:
          type: string
        permissions:
          type: array
          items:
            type: object
            properties:
              resource:
                $ref: '#/components/schemas/PermissionResource'
              resourceLabel:
                type: string
                description: 資源顯示名稱
              actions:
                type: object
                properties:
                  create:
                    $ref: '#/components/schemas/PermissionState'
                  read:
                    $ref: '#/components/schemas/PermissionState'
                  update:
                    $ref: '#/components/schemas/PermissionState'
                  delete:
                    $ref: '#/components/schemas/PermissionState'
                  all:
                    type: boolean
                    description: 計算屬性 - 是否所有權限都已授予

    PermissionState:
      type: object
      properties:
        granted:
          type: boolean
          description: 是否已授予權限
        inherited:
          type: boolean
          description: 是否為繼承權限
        source:
          type: string
          enum: [role, direct, team]
          description: 權限來源
        disabled:
          type: boolean
          description: 是否被組織限制禁用
        reason:
          type: string
          description: 禁用或授予的原因

    OrganizationPermissionLimit:
      type: object
      properties:
        id:
          type: string
        organizationId:
          type: string
        resource:
          $ref: '#/components/schemas/PermissionResource'
        action:
          $ref: '#/components/schemas/PermissionAction'
        allowed:
          type: boolean
        setAt:
          type: string
          format: date-time
        setBy:
          type: string
          description: 設定者 (系統管理員) ID

tags:
  - name: Better Auth
    description: Better Auth 原生組織功能 API
  - name: Permissions
    description: 全新權限管理 API
  - name: Admin
    description: 系統管理員專用 API
  - name: System
    description: 系統狀態和兼容性檢查