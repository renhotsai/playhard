# Development-only Docker Compose
# Use: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up

version: '3.8'

services:
  # Development Database Only Setup
  postgres:
    environment:
      POSTGRES_DB: playhard_dev
    ports:
      - "5433:5432"  # Use different port for dev

  # Development Next.js with hot reload
  backoffice-dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: playhard-backoffice-dev
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=development
      - POSTGRES_URL=postgres://postgres:playhard123@postgres:5432/playhard_dev
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    networks:
      - playhard-network
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev